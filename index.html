<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Catcher: GitHub Edition</title>
    <style>
        body { 
            margin: 0; background-color: #111; display: flex; 
            justify-content: center; align-items: center; height: 100vh; 
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; touch-action: none;
        }
        #game-container { position: relative; border: 4px solid #444; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        canvas { display: block; background: #1a2a6c; cursor: none; transition: background 1.5s; }
        
        /* Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; z-index: 100;
        }
        
        .menu-card { background: #222; padding: 20px; border-radius: 12px; border: 2px solid #ffcc00; width: 80%; max-width: 400px; }
        
        .powerup-list {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            text-align: left; margin: 15px 0; font-size: 12px;
        }
        .p-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 2px; }

        button { 
            padding: 12px 24px; font-size: 16px; cursor: pointer; 
            background: #ffcc00; border: none; font-weight: bold;
            border-radius: 4px; transition: 0.2s; margin-top: 10px;
        }
        button:hover { background: #fff; transform: scale(1.05); }

        .hud {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-around;
            font-weight: 900; text-shadow: 2px 2px 0px #000; z-index: 10;
            pointer-events: none; font-size: 18px;
        }

        #weather-warning {
            position: absolute; bottom: 120px; width: 100%;
            text-align: center; color: #ff3333; font-weight: 900;
            font-size: 24px; display: none; animation: blink 0.5s infinite;
            text-shadow: 0 0 10px #000; z-index: 20;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        #level-up-flash, #resume-countdown {
            position: absolute; top: 35%; width: 100%; text-align: center;
            font-size: 60px; color: #ffcc00; font-weight: bold; 
            text-shadow: 3px 3px 0px #000; display: none; z-index: 110;
        }

        table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 12px; background: #333;}
        th { border-bottom: 2px solid #ffcc00; padding: 5px; }
        td { padding: 4px; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div style="color: #ffcc00;">LVL: <span id="level">1</span></div>
        <div>LIVES: <span id="lives">4</span></div>
    </div>

    <div id="weather-warning">⚠️ WEATHER ALERT</div>
    <div id="level-up-flash">LEVEL UP</div>
    <div id="resume-countdown">3</div>

    <div id="start-menu" class="overlay">
        <div class="menu-card">
            <h1 style="color:#ffcc00; margin:0; font-size: 28px;">SKY CATCHER</h1>
            <div class="powerup-list">
                <div class="p-item"><div class="dot" style="background:#fff"></div> Points</div>
                <div class="p-item"><div class="dot" style="background:#00ffff"></div> Blaster</div>
                <div class="p-item"><div class="dot" style="background:#ff00ff"></div> God Mode</div>
                <div class="p-item"><div class="dot" style="background:#ff3333"></div> Bomb</div>
            </div>
            <p style="font-size: 12px; color: #ccc;">Move Mouse/Touch to Catch.<br>Press 'P' to Pause.</p>
            <button onclick="startGame()">START GAME</button>
        </div>
    </div>

    <div id="pause-menu" class="overlay" style="display:none;">
        <h1>PAUSED</h1>
        <button onclick="startResumeCountdown()">RESUME</button>
    </div>

    <div id="game-over" class="overlay" style="display:none;">
        <h1 style="color:#ff4444;">GAME OVER</h1>
        <p>Final Score: <span id="final-score" style="color:#ffcc00; font-weight:bold;">0</span></p>
        <div id="high-score-entry">
            <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10" style="padding:8px; text-align:center;">
            <br><button onclick="saveScore()">SUBMIT</button>
        </div>
        <div id="post-save-options" style="display:none; width: 90%;">
            <button onclick="location.reload()">PLAY AGAIN</button>
            <table id="leaderboard">
                <thead><tr><th>RANK</th><th>NAME</th><th>SCORE</th></tr></thead>
                <tbody id="score-body"></tbody>
            </table>
        </div>
    </div>

    <canvas id="gameCanvas" width="600" height="700"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    let score = 0, lives = 4, level = 1, baseSpeed = 2.5;
    let gameActive = false, isPaused = false, gameOver = false, inCountdown = false, bombLock = false;
    let spawnTimer = null, explosionAnim = 0;
    
    // Power-up States
    let godMode = false, godTimeRemaining = 0, jackpot = false, rainbowHue = 0;
    let blasterMode = false, blasterTimeRemaining = 0, lastShotTime = 0;
    
    const basket = { x: 250, targetX: 250, y: 640, w: 100, h: 20, color: '#ffcc00', lerp: 0.22 };
    let items = [], lasers = [], weatherParticles = [];
    let currentWeather = 'SUN', nextWeather = 'RAIN', lightningFlash = 0;

    const TYPES = {
        POINT: { color: '#fff' },
        BOMB:  { color: '#ff3333', label: '💣' },
        GOD:   { color: '#ff00ff', label: 'GOD' },
        WIDE:  { color: '#00ffff', label: 'WIDE' },
        JACK:  { color: '#ffff00', label: '$$$' },
        LIFE:  { color: '#00ff00', label: '+1' },
        GUN:   { color: '#00ffff', label: 'GUN' }
    };

    const SHAPES = ['SQUARE', 'CIRCLE', 'TRIANGLE', 'HEXAGON'];

    function startGame() {
        if(gameActive) return;
        document.getElementById('start-menu').style.display = 'none';
        score = 0; lives = 4; level = 1; baseSpeed = 2.5;
        items = []; lasers = []; godMode = false; blasterMode = false;
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = lives;
        document.getElementById('level').innerText = level;
        gameActive = true;
        updateWeatherSystem();
        spawnItem();
        requestAnimationFrame(update);
    }

    function spawnItem() {
        if (gameOver || !gameActive || bombLock || isPaused) {
            spawnTimer = setTimeout(spawnItem, 500);
            return;
        }
        const rand = Math.random();
        let type = TYPES.POINT;
        if (rand < 0.01) type = TYPES.BOMB; 
        else if (rand < 0.015) type = TYPES.GOD;
        else if (rand < 0.025) type = TYPES.GUN;
        else if (rand < 0.04) type = TYPES.WIDE;
        else if (rand < 0.05) type = TYPES.JACK;
        else if (rand < 0.06) type = TYPES.LIFE;

        items.push({
            x: Math.random() * (canvas.width - 30), y: -50,
            size: (type === TYPES.POINT) ? 18 : 28,
            speed: baseSpeed + (Math.random() * 2),
            type: type, shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
            rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.1
        });
        spawnTimer = setTimeout(spawnItem, Math.max(250, 1000 - (level * 80)));
    }

    function triggerBomb() {
        if(godMode) { explosionAnim = 10; items = []; return; }
        lives--;
        document.getElementById('lives').innerText = lives;
        explosionAnim = 25; items = []; lasers = []; bombLock = true;
        if (lives <= 0) endGame();
        else setTimeout(() => { bombLock = false; }, 1000);
    }

    function update() {
        if (!gameActive || gameOver || isPaused || inCountdown) { 
            if(gameActive && !gameOver) draw(); 
            requestAnimationFrame(update); 
            return; 
        }

        const now = Date.now();
        if (godMode) {
            godTimeRemaining -= 16; rainbowHue = (rainbowHue + 5) % 360;
            if (godTimeRemaining <= 0) godMode = false;
        }
        if (blasterMode) {
            blasterTimeRemaining -= 16;
            if (blasterTimeRemaining <= 0) blasterMode = false;
            if (now - lastShotTime > 160) {
                lasers.push({ x: basket.x + basket.w / 2 - 2, y: basket.y, speed: 12 });
                lastShotTime = now;
            }
        }

        // Laser Movement & Collision
        lasers.forEach((laser, lIdx) => {
            laser.y -= laser.speed;
            if (laser.y < 0) lasers.splice(lIdx, 1);
            items.forEach((item, iIdx) => {
                if (laser.x < item.x + item.size && laser.x + 4 > item.x && laser.y < item.y + item.size && laser.y + 15 > item.y) {
                    if (item.type === TYPES.BOMB) triggerBomb();
                    else { applyEffect(item.type); items.splice(iIdx, 1); }
                    lasers.splice(lIdx, 1);
                }
            });
        });

        // Weather Warning Logic
        let scoreToNext = 250 - (score % 250);
        let warn = document.getElementById('weather-warning');
        if (scoreToNext <= 60 && score > 0) {
            warn.style.display = 'block';
            warn.innerHTML = `⚠️ ${nextWeather} INCOMING`;
        } else { warn.style.display = 'none'; }

        if (Math.floor(score / 250) + 1 > level) {
            level++; baseSpeed += 0.5;
            document.getElementById('level').innerText = level;
            updateWeatherSystem();
            flashLevelUp();
        }

        // Movement
        let nextX = basket.x + (basket.targetX - basket.x) * basket.lerp;
        basket.x = Math.max(0, Math.min(canvas.width - basket.w, nextX));

        if (!bombLock) {
            items.forEach((item, index) => {
                item.y += item.speed; item.rotation += item.rotSpeed;
                if (item.y + item.size > basket.y && item.x < basket.x + basket.w && item.x + item.size > basket.x) {
                    if (item.type === TYPES.BOMB) triggerBomb();
                    else { applyEffect(item.type); items.splice(index, 1); }
                } else if (item.y > canvas.height) {
                    if (!godMode && item.type === TYPES.POINT) {
                        lives--; document.getElementById('lives').innerText = lives;
                        if (lives <= 0) endGame();
                    }
                    items.splice(index, 1);
                }
            });
        }

        weatherParticles.forEach(p => {
            p.y += p.speed; if (currentWeather === 'SNOW') p.x += p.drift;
            if (p.y > canvas.height) p.y = -50;
        });

        if (currentWeather === 'RAIN' && Math.random() < 0.005) lightningFlash = 6;
        if (lightningFlash > 0) lightningFlash--;
        if (explosionAnim > 0) explosionAnim--;

        draw();
        requestAnimationFrame(update);
    }

    function applyEffect(type) {
        if (type === TYPES.POINT) score += jackpot ? 50 : 10;
        else if (type === TYPES.LIFE) lives++;
        else if (type === TYPES.WIDE) { basket.w = 180; setTimeout(() => { basket.w = 100; }, 8000); }
        else if (type === TYPES.GOD) { godMode = true; godTimeRemaining = 8000; }
        else if (type === TYPES.GUN) { blasterMode = true; blasterTimeRemaining = 8000; }
        else if (type === TYPES.JACK) { jackpot = true; setTimeout(() => jackpot = false, 10000); }
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = lives;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Particles
        weatherParticles.forEach(p => {
            ctx.beginPath();
            if (currentWeather === 'RAIN') { ctx.strokeStyle = 'rgba(174, 194, 224, 0.4)'; ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y + p.len); ctx.stroke(); }
            else if (currentWeather === 'SNOW') { ctx.fillStyle = 'white'; ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }
            else if (currentWeather === 'FOG') { ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`; ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }
        });
        
        lasers.forEach(laser => { ctx.fillStyle = "#00ffff"; ctx.fillRect(laser.x, laser.y, 4, 15); });

        if (lightningFlash > 0) { ctx.fillStyle = `rgba(255, 255, 255, ${lightningFlash/6})`; ctx.fillRect(0,0,canvas.width, canvas.height); }
        if (explosionAnim > 0) { ctx.fillStyle = `rgba(255, 100, 0, ${explosionAnim/25})`; ctx.beginPath(); ctx.arc(basket.x + basket.w/2, basket.y, 80 + (25-explosionAnim)*4, 0, Math.PI*2); ctx.fill(); }

        // Bar
        if (godMode) {
            ctx.fillStyle = `hsl(${rainbowHue}, 100%, 60%)`;
            ctx.shadowBlur = 15; ctx.shadowColor = `hsl(${rainbowHue}, 100%, 60%)`;
        } else { ctx.fillStyle = basket.color; }
        
        if (blasterMode) { ctx.fillStyle = "#555"; ctx.fillRect(basket.x + basket.w/2 - 8, basket.y - 12, 16, 12); ctx.fillStyle = godMode ? `hsl(${rainbowHue}, 100%, 60%)` : basket.color; }
        ctx.fillRect(basket.x, basket.y, basket.w, basket.h);
        ctx.shadowBlur = 0;

        // Items
        items.forEach(item => {
            ctx.save(); ctx.translate(item.x + item.size/2, item.y + item.size/2);
            ctx.rotate(item.rotation); ctx.fillStyle = item.type.color; ctx.beginPath();
            let s = item.size / 2;
            if(item.shape === 'SQUARE') ctx.rect(-s, -s, item.size, item.size);
            else if(item.shape === 'CIRCLE') ctx.arc(0, 0, s, 0, Math.PI * 2);
            else if(item.shape === 'TRIANGLE') { ctx.moveTo(0, -s); ctx.lineTo(s, s); ctx.lineTo(-s, s); }
            else { for (let i = 0; i < 6; i++) ctx.lineTo(s * Math.cos(i * Math.PI / 3), s * Math.sin(i * Math.PI / 3)); }
            ctx.closePath(); ctx.fill();
            if(item.type.label) { ctx.rotate(-item.rotation); ctx.fillStyle = "black"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center"; ctx.fillText(item.type.label, 0, 4); }
            ctx.restore();
        });
    }

    function updateWeatherSystem() {
        const types = ['SUN', 'RAIN', 'SNOW', 'FOG'];
        currentWeather = nextWeather;
        nextWeather = types[Math.floor(Math.random() * types.length)];
        weatherParticles = [];
        if (currentWeather === 'SUN') canvas.style.background = "#1a2a6c";
        else if (currentWeather === 'RAIN') { canvas.style.background = "#0f172a"; for (let i = 0; i < 60; i++) weatherParticles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, speed: 15, len: 20 }); }
        else if (currentWeather === 'SNOW') { canvas.style.background = "#1e293b"; for (let i = 0; i < 50; i++) weatherParticles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, speed: 2, size: 3, drift: Math.random() - 0.5 }); }
        else if (currentWeather === 'FOG') { canvas.style.background = "#475569"; for (let i = 0; i < 10; i++) weatherParticles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, speed: 0.5, size: 80, opacity: 0.1 }); }
    }

    function startResumeCountdown() {
        document.getElementById('pause-menu').style.display = 'none'; inCountdown = true;
        let c = 3; const el = document.getElementById('resume-countdown'); el.style.display = 'block'; el.innerText = c;
        const t = setInterval(() => { c--; if(c<=0){ clearInterval(t); el.style.display='none'; isPaused=false; inCountdown=false; } else el.innerText=c; }, 1000);
    }

    function togglePause() { if(!gameActive || gameOver || inCountdown) return; isPaused = !isPaused; document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none'; if(!isPaused) startResumeCountdown(); }
    function flashLevelUp() { const el = document.getElementById('level-up-flash'); el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 1500); }
    function endGame() { gameOver = true; gameActive = false; document.getElementById('game-over').style.display = 'flex'; document.getElementById('final-score').innerText = score; }
    function saveScore() {
        const name = document.getElementById("player-name").value || "ANON";
        let hs = JSON.parse(localStorage.getItem("sky_scores") || "[]");
        hs.push({ name, score }); hs.sort((a,b)=>b.score-a.score); hs = hs.slice(0,5);
        localStorage.setItem("sky_scores", JSON.stringify(hs));
        document.getElementById("high-score-entry").style.display = "none";
        document.getElementById("post-save-options").style.display = "block";
        document.getElementById("score-body").innerHTML = hs.map((s,i)=>`<tr><td>#${i+1}</td><td>${s.name}</td><td>${s.score}</td></tr>`).join("");
    }

    // Input Handlers
    const move = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        basket.targetX = clientX - rect.left - basket.w/2;
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('touchstart', move);
    window.addEventListener('touchmove', move);
    window.addEventListener('keydown', (e) => { if(e.key.toLowerCase()==='p') togglePause(); });
</script>
</body>
</html>
